<!DOCTYPE html>
<html lang="ja">
<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- ホーム画面アイコン -->
  <link rel="apple-touch-icon" href="icon.png">

  <title>ポケモンさんすう</title>

  <link rel="stylesheet" href="style.css">

  <!-- ⭐重要：defer -->
  <script src="app.js" defer></script>

</head>

<body>

<header>
  <h1>ポケモンさんすう</h1>
  <button onclick="openDex()">📕ずかん</button>
</header>

<h2 id="pokemonName">ポケモン</h2>

<div id="battleArea">
  <div id="grass"></div>

  <img id="pokemonImage" src="" alt="ポケモン">
  <img id="ballImg" src="ball.png" alt="ボール">
</div>

<div id="message"></div>

<div id="questionArea">
  <h2 id="question">1 + 1 = ?</h2>

  <input id="answerInput" type="number">

  <button onclick="checkAnswer()">こたえる</button>
</div>

<div id="catchArea" class="hidden">
  <button onclick="throwBall()">ボールをなげる</button>
</div>

<div id="nextArea" class="hidden">
  <button onclick="nextPokemon()">つぎへ</button>
</div>

<div id="dexModal" class="hidden">
  <div class="modal">
    <h2>ずかん</h2>
    <div id="dexContent"></div>
    <button onclick="closeDex()">とじる</button>
  </div>
</div>

</body>
</html>
